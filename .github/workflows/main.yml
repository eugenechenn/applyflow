name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install deps
        run: npm install

      - name: Validate schema
        run: npm run validate:schema

      - name: Validate contamination
        run: npm run validate:contamination

      - name: Validate fixtures
        run: npm run validate:fixtures
